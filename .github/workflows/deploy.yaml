name: Pipeline App CI/CD 

on: 
  workflow_dispatch:
    

permissions:
  id-token: write  
  contents: read

jobs:
  build_app:
    name: build_ecr
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4 

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::547320736290:role/github-actions-ecr-eks-role
          aws-region: eu-north-1

      - name: Login Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, Push Image to Amazon ECR
        run: | 
          docker build -t 547320736290.dkr.ecr.eu-north-1.amazonaws.com/my-app-repo:latest ./FinanceApp 
          docker push 547320736290.dkr.ecr.eu-north-1.amazonaws.com/my-app-repo:latest

  deploy_eks:
    name: deploy_eks
    needs: build_app
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::547320736290:role/github-actions-ecr-eks-role
          aws-region: eu-north-1

      # Download and install kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.33.0' 

      # Authenticate kubectl with your EKS cluster
      - name: Update Kubeconfig do EKS
        run: |
          aws eks update-kubeconfig --region eu-north-1 --name ex-self-mng-al2023

      # Apply the Kubernetes deployment manifest
      - name: Deploy to EKS
        run: |
          kubectl apply -f ./manifests/deployment.yaml